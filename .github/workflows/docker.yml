name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  # Definimos directamente la ruta de tu imagen en minúsculas para evitar errores de Docker
  REGISTRY_IMAGE: ghcr.io/andrekn95/devops-flask-postgres
  IMAGE_TAG: 2.0.0

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Código
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir Imagen
        run: |
          docker build \
            -t ${{ env.REGISTRY_IMAGE }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.REGISTRY_IMAGE }}:latest \
            .

      - name: Publicar Imagen
        run: |
          docker push ${{ env.REGISTRY_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.REGISTRY_IMAGE }}:latest