version: '3.9'

services:

  db:
    image: postgres:17-alpine
    container_name: postgresdb
    environment:
      POSTGRES_DB: empresa
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - red-backend  
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@correo.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - red-backend
      - red-frontend

  app:
    image: ghcr.io/usuario/devops-flask-postgres:2.0.0
    container_name: flaskapp
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db               
      - DB_NAME=empresa
      - DB_USER=admin
      - DB_PASSWORD=admin123
    depends_on:
      - db
    networks:
      - red-backend
      - red-frontend

volumes:
  postgres_data:

networks:
  red-backend:
    driver: bridge
  red-frontend:
    driver: bridge